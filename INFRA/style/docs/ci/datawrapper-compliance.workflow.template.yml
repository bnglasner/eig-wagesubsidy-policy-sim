name: Datawrapper Compliance (Template)

# Copy this file to downstream repos as:
# .github/workflows/datawrapper-compliance.yml

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  datawrapper-compliance:
    runs-on: ubuntu-latest
    env:
      # Adjust these in downstream repos.
      MANIFEST_GLOB: "**/*datawrapper*manifest*.csv"
      LEGACY_METADATA_GLOB: "**/*legacy*metadata*.json"
      REQUIRE_MANIFEST: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate Datawrapper publish manifests
        shell: bash
        run: |
          set -euo pipefail
          shopt -s globstar nullglob

          manifests=( $MANIFEST_GLOB )

          if [ "${#manifests[@]}" -eq 0 ]; then
            if [ "$REQUIRE_MANIFEST" = "true" ]; then
              echo "ERROR: No manifest files matched MANIFEST_GLOB=$MANIFEST_GLOB"
              exit 1
            fi
            echo "No manifests found and REQUIRE_MANIFEST=false; skipping."
            exit 0
          fi

          for manifest in "${manifests[@]}"; do
            echo "Validating manifest: $manifest"
            python3 scripts/compliance/check_datawrapper_manifest.py "$manifest"
          done

      - name: Validate legacy metadata sidecars (if present)
        shell: bash
        run: |
          set -euo pipefail
          shopt -s globstar nullglob

          metadata_files=( $LEGACY_METADATA_GLOB )
          if [ "${#metadata_files[@]}" -eq 0 ]; then
            echo "No legacy metadata files matched LEGACY_METADATA_GLOB=$LEGACY_METADATA_GLOB"
            exit 0
          fi

          for meta in "${metadata_files[@]}"; do
            echo "Validating legacy metadata: $meta"
            python3 scripts/compliance/check_legacy_metadata.py "$meta"
          done
